name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve solution path
        id: solution
        run: |
          solution_path="$(find "$GITHUB_WORKSPACE" -maxdepth 4 -name '*.sln' | head -n 1)"
          if [ -z "$solution_path" ]; then
            echo "No solution file found under $GITHUB_WORKSPACE"
            exit 1
          fi
          echo "Using solution: $solution_path"
          echo "path=$solution_path" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore "${{ steps.solution.outputs.path }}"

      - name: Build
        run: dotnet build "${{ steps.solution.outputs.path }}" --configuration Release --no-restore

      - name: Test
        run: dotnet test "${{ steps.solution.outputs.path }}" --configuration Release --no-build
